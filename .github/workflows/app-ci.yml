name: app-ci

on:
  push:
    branches: [main]
    paths:
      - 'unii-app/**'
      - '.github/workflows/app-ci.yml'
  pull_request:
    paths:
      - 'unii-app/**'
      - '.github/workflows/app-ci.yml'

jobs:
  test:
    name: analyze + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unii-app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test --coverage

  build:
    name: build apk (debug)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: unii-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: unii-app/build/app/outputs/flutter-apk/app-debug.apk
