services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: unii-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unii}
      POSTGRES_USER: ${POSTGRES_USER:-unii}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unii}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unii} -d ${POSTGRES_DB:-unii}"]
      interval: 5s
      timeout: 5s
      retries: 10

  unii-server:
    build:
      context: ./unii-server
      dockerfile: Dockerfile
    container_name: unii-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-unii}:${POSTGRES_PASSWORD:-unii}@postgres:5432/${POSTGRES_DB:-unii}
      JWT_SECRET: ${JWT_SECRET}
      RUST_LOG: ${RUST_LOG:-info,unii_server=debug,sqlx=warn}
      SERVER_PORT: 8080
      AMAP_WEB_KEY: ${AMAP_WEB_KEY:-}
      OSRM_BASE_URL: ${OSRM_BASE_URL:-}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # Reverse proxy — disabled until W8 (TLS / public deployment).
  # Uncomment and edit Caddyfile to enable.
  # caddy:
  #   image: caddy:2
  #   container_name: unii-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy-data:/data
  #     - caddy-config:/config
  #   depends_on:
  #     - unii-server

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
